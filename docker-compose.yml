version: "3.9"

services:
  etcd:
    image: quay.io/coreos/etcd:v3.5.12
    container_name: etcd
    environment:
      ETCD_NAME: etcd0
      ETCD_INITIAL_CLUSTER: etcd0=http://etcd:2380
      ETCD_INITIAL_CLUSTER_STATE: new
      ETCD_INITIAL_CLUSTER_TOKEN: token
      ETCD_ADVERTISE_CLIENT_URLS: http://etcd:2379
      ETCD_LISTEN_CLIENT_URLS: http://0.0.0.0:2379
      ETCD_LISTEN_PEER_URLS: http://0.0.0.0:2380
      ETCD_INITIAL_ADVERTISE_PEER_URLS: http://etcd:2380
    ports:
      - "2379:2379"

  postgres1:
    image: ghcr.io/zalando/spilo-16:3.0-p1
    container_name: postgres1
    environment:
      SCOPE: postgres-cluster
      PGROOT: /home/postgres/pgdata
      ETCD_HOST: etcd:2379
      PGUSER_SUPERUSER: admin
      PGPASSWORD_SUPERUSER: password
      PGUSER_STANDBY: replicator
      PGPASSWORD_STANDBY: replica_pass
    ports:
      - "5432:5432"
      - "8008:8008"
    depends_on:
      - etcd

  postgres2:
    image: ghcr.io/zalando/spilo-16:3.0-p1
    container_name: postgres2
    environment:
      SCOPE: postgres-cluster
      PGROOT: /home/postgres/pgdata
      ETCD_HOST: etcd:2379
      PGUSER_SUPERUSER: admin
      PGPASSWORD_SUPERUSER: password
      PGUSER_STANDBY: replicator
      PGPASSWORD_STANDBY: replica_pass
    ports:
      - "5433:5432"
      - "8009:8008"
    depends_on:
      - etcd

  postgres3:
    image: ghcr.io/zalando/spilo-16:3.0-p1
    container_name: postgres3
    environment:
      SCOPE: postgres-cluster
      PGROOT: /home/postgres/pgdata
      ETCD_HOST: etcd:2379
      PGUSER_SUPERUSER: admin
      PGPASSWORD_SUPERUSER: password
      PGUSER_STANDBY: replicator
      PGPASSWORD_STANDBY: replica_pass
    ports:
      - "5434:5432"
      - "8010:8008"
    depends_on:
      - etcd

  haproxy:
    image: haproxy:2.9
    container_name: haproxy
    ports:
      - "5000:5000"
      - "5001:5001"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - postgres1
      - postgres2
      - postgres3

networks:
  default:
    name: postgres-ha-network
